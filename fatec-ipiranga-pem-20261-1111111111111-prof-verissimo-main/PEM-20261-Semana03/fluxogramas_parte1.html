<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Fluxogramas Parte I – Semana 3</title>
<style>
  body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 30px; }
  h2 { color: #1a3a5c; margin-bottom: 4px; }
  svg { background: white; box-shadow: 2px 2px 8px rgba(0,0,0,0.2); }
  text { font-family: Arial, sans-serif; font-size: 11.5px; fill: white; font-weight: bold; text-anchor: middle; }
  .lbl { fill: #1a3a5c; font-size: 11px; font-weight: bold; }
  .arrow { fill: none; stroke: #1a3a5c; stroke-width: 2; marker-end: url(#arr); }
  .terminal { fill: #1F4E79; stroke: #1a3a5c; stroke-width:2; }
  .process  { fill: #2E75B6; stroke: #1a3a5c; stroke-width:2; }
  .decision { fill: #ED7D31; stroke: #1a3a5c; stroke-width:2; }
  .io       { fill: #70AD47; stroke: #1a3a5c; stroke-width:2; }
</style>
</head>
<body>

<!-- CODIGO 1 -->
<div>
<h2>Código 1 – Inicialização e Percorrimento Básico</h2>
<svg width="380" height="460" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#1a3a5c"/>
  </marker>
</defs>
<ellipse cx="190" cy="40" rx="65" ry="22" class="terminal"/>
<text x="190" y="45">INÍCIO</text>

<rect x="100" y="78" width="180" height="36" rx="4" class="process"/>
<text x="190" y="101">numeros[5] = {10,20,30,40,50}</text>

<polygon points="190,132 290,148 190,164 90,148" class="io"/>
<text x="190" y="152">Exibir cabeçalho</text>

<rect x="100" y="178" width="180" height="36" rx="4" class="process"/>
<text x="190" y="201">i = 0</text>

<polygon points="190,232 298,252 190,272 82,252" class="decision"/>
<text x="190" y="248">i &lt; 5 ?</text>
<text x="190" y="263">&nbsp;</text>

<polygon points="190,290 298,306 190,322 82,306" class="io"/>
<text x="190" y="310">Exibir numeros[i]</text>

<rect x="100" y="336" width="180" height="36" rx="4" class="process"/>
<text x="190" y="359">i++</text>

<ellipse cx="190" cy="420" rx="65" ry="22" class="terminal"/>
<text x="190" y="425">FIM</text>

<line x1="190" y1="62" x2="190" y2="76" class="arrow"/>
<line x1="190" y1="114" x2="190" y2="130" class="arrow"/>
<line x1="190" y1="166" x2="190" y2="176" class="arrow"/>
<line x1="190" y1="214" x2="190" y2="230" class="arrow"/>
<line x1="190" y1="274" x2="190" y2="288" class="arrow"/>
<text x="160" y="285" class="lbl">Sim</text>
<line x1="190" y1="324" x2="190" y2="334" class="arrow"/>
<line x1="190" y1="372" x2="190" y2="374" class="arrow"/>
<!-- i++ -> volta para condição -->
<path d="M100,354 L60,354 L60,252 L80,252" class="arrow"/>
<!-- i >= 5 -> FIM -->
<path d="M298,252 L340,252 L340,420 L257,420" class="arrow"/>
<text x="304" y="247" class="lbl">Não</text>
</svg>
</div>

<!-- CODIGO 2 -->
<div>
<h2>Código 2 – Operações Aritméticas em Arrays</h2>
<svg width="380" height="510" xmlns="http://www.w3.org/2000/svg">
<ellipse cx="190" cy="40" rx="65" ry="22" class="terminal"/>
<text x="190" y="45">INÍCIO</text>

<rect x="90" y="78" width="200" height="36" rx="4" class="process"/>
<text x="190" y="101">notas[4]={7.5,8.0,6.5,9.0} soma=0</text>

<rect x="90" y="130" width="200" height="36" rx="4" class="process"/>
<text x="190" y="153">i = 0</text>

<polygon points="190,184 295,204 190,224 85,204" class="decision"/>
<text x="190" y="208">i &lt; 4 ?</text>

<rect x="90" y="240" width="200" height="36" rx="4" class="process"/>
<text x="190" y="263">soma += notas[i]</text>

<rect x="90" y="292" width="200" height="36" rx="4" class="process"/>
<text x="190" y="315">i++</text>

<rect x="90" y="350" width="200" height="36" rx="4" class="process"/>
<text x="190" y="373">media = soma / 4</text>

<polygon points="190,402 295,418 190,434 85,418" class="io"/>
<text x="190" y="422">Exibir media</text>

<ellipse cx="190" cy="470" rx="65" ry="22" class="terminal"/>
<text x="190" y="475">FIM</text>

<line x1="190" y1="62" x2="190" y2="76" class="arrow"/>
<line x1="190" y1="114" x2="190" y2="128" class="arrow"/>
<line x1="190" y1="166" x2="190" y2="182" class="arrow"/>
<line x1="190" y1="226" x2="190" y2="238" class="arrow"/>
<text x="160" y="236" class="lbl">Sim</text>
<line x1="190" y1="276" x2="190" y2="290" class="arrow"/>
<line x1="190" y1="328" x2="190" y2="348" class="arrow"/>
<!-- i++ -> volta condicional -->
<path d="M90,310 L50,310 L50,204 L83,204" class="arrow"/>
<!-- Não -> media -->
<path d="M295,204 L340,204 L340,368 L292,368" class="arrow"/>
<text x="300" y="199" class="lbl">Não</text>
<line x1="190" y1="386" x2="190" y2="400" class="arrow"/>
<line x1="190" y1="436" x2="190" y2="446" class="arrow"/>
</svg>
</div>

<!-- CODIGO 3 -->
<div>
<h2>Código 3 – Busca de Elementos</h2>
<svg width="420" height="600" xmlns="http://www.w3.org/2000/svg">
<ellipse cx="210" cy="40" rx="65" ry="22" class="terminal"/>
<text x="210" y="45">INÍCIO</text>

<rect x="105" y="78" width="210" height="36" rx="4" class="process"/>
<text x="210" y="101">valores[6]={12,45,78,23,56,89}</text>
<text x="210" y="111" style="font-size:9px;">encontrado=0, i=0</text>

<polygon points="210,130 320,146 210,162 100,146" class="io"/>
<text x="210" y="150">Ler busca</text>

<polygon points="210,178 320,198 210,218 100,198" class="decision"/>
<text x="210" y="195">i &lt; 6 ?</text>

<polygon points="210,234 320,254 210,274 100,254" class="decision"/>
<text x="210" y="251">valores[i]</text>
<text x="210" y="266">== busca?</text>

<polygon points="210,290 320,306 210,322 100,306" class="io"/>
<text x="210" y="310">Exibir "Encontrado na posição i"</text>

<rect x="105" y="336" width="210" height="36" rx="4" class="process"/>
<text x="210" y="359">encontrado = 1 | break</text>

<rect x="105" y="392" width="210" height="36" rx="4" class="process"/>
<text x="210" y="415">i++</text>

<polygon points="210,450 318,468 210,486 102,468" class="decision"/>
<text x="210" y="472">encontrado</text>
<text x="210" y="486">== 0?</text>

<polygon points="210,502 316,518 210,534 104,518" class="io"/>
<text x="210" y="522">Exibir "Não localizado"</text>

<ellipse cx="210" cy="568" rx="65" ry="22" class="terminal"/>
<text x="210" y="573">FIM</text>

<line x1="210" y1="62" x2="210" y2="76" class="arrow"/>
<line x1="210" y1="114" x2="210" y2="128" class="arrow"/>
<line x1="210" y1="164" x2="210" y2="176" class="arrow"/>
<line x1="210" y1="220" x2="210" y2="232" class="arrow"/>
<text x="178" y="232" class="lbl">Sim</text>
<!-- i<6 Não -> verificar encontrado -->
<path d="M320,198 L370,198 L370,468 L320,468" class="arrow"/>
<text x="325" y="194" class="lbl">Não</text>

<line x1="210" y1="276" x2="210" y2="288" class="arrow"/>
<text x="178" y="288" class="lbl">Sim</text>
<!-- Não igual -> i++ -->
<path d="M100,254 L55,254 L55,410 L103,410" class="arrow"/>
<text x="60" y="250" class="lbl">Não</text>

<line x1="210" y1="324" x2="210" y2="334" class="arrow"/>
<line x1="210" y1="372" x2="210" y2="390" class="arrow"/>
<!-- i++ -> i<6? -->
<path d="M105,410 L42,410 L42,198 L98,198" class="arrow" style="display:none"/>

<line x1="210" y1="428" x2="210" y2="448" class="arrow"/>
<!-- break -> encontrado==0? (after loop) already connected via path -->
<line x1="210" y1="488" x2="210" y2="500" class="arrow"/>
<text x="178" y="500" class="lbl">Sim</text>
<!-- encontrado!=0 -> FIM direto -->
<path d="M318,468 L390,468 L390,568 L277,568" class="arrow"/>
<text x="325" y="464" class="lbl">Não</text>
<line x1="210" y1="536" x2="210" y2="545" class="arrow"/>
</svg>
</div>

</body>
</html>
